<!DOCTYPE html>
<html lang="hu">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bob ChatFal</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            .bg-hungary {
                background: linear-gradient(to right, red, white, green);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="row text-center">
                <div class="col-12 bg-hungary"><h1>Üdvözölünk a Bob ChatFalon</h1></div>
                <div class="col-12 bg-warning">
                    <div class="row">
                        <div class="col-12">Kérjük válassza ki melyik ChatFalon szeretne kommunikálni.</div>
                        <div class="col-12 col-md-6 d-flex">
                            <div class="card m-1">
                            <div class="card-body">
                                <h5 class="card-title">V.I.P Chat</h5>
                                <p class="card-text">Maximum 20 fő képes csatlakozni</p>
                                <a href="#" class="btn btn-dark">Csatlakotás</a>
                            </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-6 d-flex">
                            <div class="card m-1">
                            <div class="card-body">
                                <h5 class="card-title">Publikus Chat</h5>
                                <p class="card-text">Ha nem vagy képes csatlakozni a V.I.P Chatre csatlakozz ide.</p>
                                <a href="#" class="btn btn-dark">Csatlakozás</a>
                            </div>
                            </div>
                        </div>
                        <div class="col-12 m-4"><a class="btn btn-dark" href="https://xiaomi512.github.io/bobtok.bob/index.html">Főoldal</a></div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
