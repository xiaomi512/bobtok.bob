    <style>

        }

        .quiz-selector-card {
            cursor: pointer;
            transition: 0.2s;

        .quiz-selector-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2) !important;

    </style>
</head>

            </div>
            <div class="col-12 bg-danger p-3">
                <div class="row" id="main-content">
                    <div id="selector-view" class="row g-3">
                        <div class="col-12 col-md-4 col-lg-3">
                            <div class="card shadow quiz-selector-card h-100" onclick="startQuiz('magyarorszag')">

                            </div>

                            </div>
                        </div>

                            </div>
                            <div class="card-footer text-end d-none" id="footer">

                            </div>
                        </div>
                    </div>

                </div>
            </div>

            'matek': {
                title: "Matek Kvíz",
                questions: [
                    { q: "Melyik a legkisebb prímszám?", a: ["1", "2", "3"], c: 1 },
                    { q: "Mennyi 5 x 5?", a: ["20", "25", "30"], c: 1 }
                ]
            }
        };

        let currentQuizQuestions = [];
        let currentQ = 0;
        let score = 0;

        const qEl = document.getElementById('question');
        const oEl = document.getElementById('options');
        const fEl = document.getElementById('feedback');
        const nBtn = document.getElementById('next-btn');
        const foot = document.getElementById('footer');
        const selectorView = document.getElementById('selector-view');
        const quizView = document.getElementById('quiz-view');
        const quizTitleDisplay = document.getElementById('quiz-title');

        function startQuiz(quizKey) {
            const selected = quizData[quizKey];
            currentQuizQuestions = selected.questions;
            quizTitleDisplay.innerText = selected.title;
            currentQ = 0;
            score = 0;

            selectorView.classList.add('d-none');
            quizView.classList.remove('d-none');
            loadQ();
        }

        function loadQ() {
            const q = currentQuizQuestions[currentQ];
            qEl.innerText = q.q;
            oEl.innerHTML = '';
            fEl.classList.add('d-none');
            foot.classList.add('d-none');
            
            q.a.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.innerText = opt;
                btn.className = "btn btn-outline-dark text-start p-3";
                btn.onclick = () => check(i);
                oEl.appendChild(btn);
            });
        }

        function check(i) {
    const q = currentQuizQuestions[currentQ];
    const buttons = oEl.querySelectorAll('button');
    buttons.forEach(b => b.disabled = true);
    fEl.classList.remove('d-none', 'alert-success', 'alert-danger');
    
    // Alaphelyzetbe állítjuk a Következő gomb színét (töröljük az előző kör színét)
    nBtn.classList.remove('btn-success', 'btn-danger');

    if(i === q.c) {
        score++;
        fEl.innerText = "✅ Helyes válasz!";
        fEl.classList.add('alert-success');
        buttons[i].classList.replace('btn-outline-dark', 'btn-success');
        
        // HA JÓ: A Következő gomb ZÖLD lesz
        nBtn.classList.add('btn-success');
    } else {
        fEl.innerText = "❌ Sajnos nem. A helyes válasz: " + q.a[q.c];
        fEl.classList.add('alert-danger');
        buttons[i].classList.replace('btn-outline-dark', 'btn-danger');
        buttons[q.c].classList.replace('btn-outline-dark', 'btn-success');
        
        // HA ROSSZ: A Következő gomb PIROS lesz
        nBtn.classList.add('btn-danger');
    }

    if(currentQ < currentQuizQuestions.length - 1) {
        foot.classList.remove('d-none');
    } else {
        // Kvíz vége - az általad kért üzenettel
        foot.classList.add('d-none'); 
        const endMsg = document.createElement('div');
        endMsg.className = "text-center mt-4 p-3 border-top";
        endMsg.innerHTML = `
            <h5 class="mb-2">Kvíz vége!</h5>
            <p class="display-6 fw-bold text-dark">${score} / ${currentQuizQuestions.length}</p>
            <button onclick="location.reload()" class="btn btn-sm btn-secondary mb-3">Vissza a választóhoz</button>
            <h5 class="mb-2">Ossza meg eredményét a <a href="https://xiaomi512.github.io/bobtok.bob/chatfal.html" class="text-primary">Bob Chatfalon</a>!</h5>
        `;
        oEl.appendChild(endMsg);
    }
}
        nBtn.onclick = () => { currentQ++; loadQ(); };
    </script>
</body>
